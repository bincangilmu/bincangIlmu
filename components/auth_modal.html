    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>

            <div class="auth-tabs">
                <button class="auth-tab-btn active" id="loginTabBtn" onclick="switchAuthTab('login')">Masuk</button>
                <button class="auth-tab-btn" id="registerTabBtn" onclick="switchAuthTab('register')">Daftar</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <form action="#">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="nama@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="******">
                        <i class="far fa-eye toggle-password"></i>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> Ingat Saya
                        </label>
                        <a href="#" class="forgot-password">Lupa Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="width: 100%">Masuk</button>
                </form>

                <div class="divider"><span>Atau masuk dengan</span></div>

                <button class="btn-google">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Masuk dengan Google
                </button>

                <p class="text-center mt-3" style="font-size: 0.9rem; color: var(--text-light); margin-top: 1.5rem">
                    Belum punya akun? <a href="#" onclick="switchAuthTab('register')"
                        style="color: var(--primary-color); font-weight: 500">Daftar Sekarang</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <form action="#">
                    <div class="form-group">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-input" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="nama@email.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="******">
                        <i class="far fa-eye toggle-password"></i>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Konfirmasi Password</label>
                        <input type="password" class="form-input" placeholder="******">
                        <i class="far fa-eye toggle-password"></i>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="width: 100%">Daftar</button>
                </form>

                <div class="divider"><span>Atau daftar dengan</span></div>

                <button class="btn-google">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Daftar dengan Google
                </button>
                <p class="text-center mt-3" style="font-size: 0.9rem; color: var(--text-light); margin-top: 1.5rem">
                    Sudah punya akun? <a href="#" onclick="switchAuthTab('login')"
                        style="color: var(--primary-color); font-weight: 500">Masuk</a>
                </p>
            </div>
        </div>
    </div>
