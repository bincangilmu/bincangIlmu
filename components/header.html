<header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">
                <span>bincang</span>
                <span><span class="highlight">ilmu</span>.</span>
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Beranda</a></li>
                    <li><a href="courses.html" class="nav-link">Kursus</a></li>
                    <li><a href="kitab.html" class="nav-link">Kitab</a></li>
                    <li><a href="fatwa.html" class="nav-link">Fatwa</a></li>
                    <li><a href="blog.html" class="nav-link">Blog</a></li>
                    <li><a href="about.html" class="nav-link">Tentang Kami</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="search-toggle" onclick="openSearch()" aria-label="Search"
                    style="background: none; border: none; font-size: 1.1rem; color: var(--text-dark); cursor: pointer; margin-right: 0.5rem;">
                    <i class="fas fa-search"></i>
                </button>
                <a href="#" class="btn btn-outline" id="loginBtn" onclick="openModal('login'); return false;">Masuk</a>
                <a href="#" class="btn btn-primary" id="registerBtn"
                    onclick="openModal('register'); return false;">Daftar Sekarang</a>

                <!-- User Profile (Hidden by default) -->
                <div class="user-profile-wrapper" id="userProfile" style="display: none;">
                    <button class="profile-toggle" id="profileToggleBtn"
                        onclick="toggleProfileMenu(event); return false;">
                        <div class="profile-avatar-initial"></div>
                        <span class="profile-name"></span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <!-- Floating Dropdown -->
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-header">
                            <div class="user-info">
                                <strong></strong>
                                <span></span>
                            </div>
                        </div>
                        <ul class="dropdown-menu">
                            <li><a href="#" onclick="openProfileModal('settings'); return false;"><i
                                        class="fas fa-user-cog"></i> Pengaturan Profil</a></li>
                            <li><a href="#" onclick="openProfileModal('courses'); return false;"><i
                                        class="fas fa-book-reader"></i> Kursus Saya</a></li>
                            <li><a href="#" onclick="openProfileModal('certificates'); return false;"><i
                                        class="fas fa-certificate"></i> Sertifikat</a></li>
                            <li><a href="#" onclick="openProfileModal('app-settings'); return false;"><i
                                        class="fas fa-cog"></i> Setting</a></li>
                            <li class="divider"></li>
                            <li><a href="#" onclick="handleLogout(); return false;" class="text-danger"><i
                                        class="fas fa-sign-out-alt"></i> Log Out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <button class="mobile-toggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>
